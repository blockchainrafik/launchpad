name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  contracts:
    name: Rust Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          components: rustfmt

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --workspace

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Report WASM Size
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const wasmDir = 'target/wasm32-unknown-unknown/release';
            
            if (!fs.existsSync(wasmDir)) {
              console.log('WASM target directory not found.');
              return;
            }

            const files = fs.readdirSync(wasmDir);
            const wasmFiles = files.filter(f => f.endsWith('.wasm'));
            
            let message = '### 📦 WASM Size Report\n\n| Contract | Size |\n| :--- | :--- |\n';
            for (const file of wasmFiles) {
              const stats = fs.statSync(path.join(wasmDir, file));
              const size = (stats.size / 1024).toFixed(2);
              message += `| \`${file}\` | ${size} KB |\n`;
            }
            
            // Post result as PR comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && comment.body.includes('WASM Size Report')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: message,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: message,
              });
            }


  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Run Jest tests
        run: npm run test
